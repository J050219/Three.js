<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <title>產生物體</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script async src="https://unpkg.com/es-module-shims@1/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "/static/node_modules/three/build/three.module.js",
          "three/examples/jsm/controls/OrbitControls.js": "/static/node_modules/three/examples/jsm/controls/OrbitControls.js",
          "three-csg-ts": "/static/node_modules/three-csg-ts/lib/esm/index.js",
          "@tweenjs/tween.js": "/static/node_modules/@tweenjs/tween.js/dist/tween.esm.js",
          "three/examples/jsm/exporters/GLTFExporter.js": "/static/node_modules/three/examples/jsm/exporters/GLTFExporter.js"
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; overflow: hidden; background: linear-gradient(180deg, #87CEFA 0%, #dbe9f4 100%); font-family: system-ui, sans-serif; }
      #optBar {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10000;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        padding: 6px 12px;
        background: rgba(30,30,30,0.35);
        border-radius: 10px;
        backdrop-filter: blur(6px);
        pointer-events: auto;
      }
      #optBar .btn{
        font-size: 14px;
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid #6ea8fe;
        background: #2f74ff;
        color: #fff;
        cursor: pointer;
      }
      #optBar .btn.ghost{
        background: transparent;
        color: #e6e6e6;
        border-color: #9aa4b2;
      }
      #optBar .btn:hover{ filter: brightness(1.08); }
      #ui {
        position: absolute;
        top: 60px;
        left: 20px;
        width: 330px !important;
        background: rgba(255, 255, 255, 0.3);
        padding: 12px;
        border-radius: 10px;
        font-family: sans-serif;
        z-index: 20;
        min-width: 330px;
      }
      .param-group {margin-bottom: 8px;}
      .param-group input {margin: 2px 0 ; display: block;  width: 100px;}
      #library {
        position: absolute;
        top: 250px!important; left: 20px;
        width: 330px !important; 
        background: rgba(255,255,255,0.3);
        border-radius: 10px;
        padding: 10px;
        z-index: 15;
        display: flex;
        overflow: hidden;
        flex-direction: column;
        color: #111;
      }
      #library h3 { margin: 0 0 8px; font-size: 16px; }
      #libraryList {flex: 1 1 auto; overflow: auto; display: block;}
      #libraryList .item {border: 1px solid #ddd; border-radius: 8px; padding: 8px; margin-bottom: 8px; background: #fff;}
      #libraryList .row { font-size: 12px; color:#555; margin-top: 4px; display:flex; align-items:center; gap:6px; }
      #libraryList .chip { width:14px; height:14px; border-radius:3px; border:1px solid #ccc; display:inline-block; }
      #libraryList .btn {margin-top: 6px; width: 100%; padding: 6px 8px; border-radius: 6px; border: 0; background:#0ea5e9; color:#fff; cursor:pointer;}
      #video {
        position: absolute;
        bottom: 10px;
        right: 10px;
        width: 200px;
        height: 150px;
        border: 2px solid #00ff00;
        background-color: black;
        z-index: 5;
      }
      button {cursor: pointer;}
    </style>
  </head>
  <body>
    <!-- 🔹 新增按鈕區 -->
    <div id="optBar">
      <button onclick="packToTheMax()" class="btn ghost">最佳化擺放</button>
      <button onclick="stopAnnealing()" class="btn ghost">停止最佳化</button>
      <button onclick="calculateVoid()" class="btn ghost">估算空隙</button>
      <button onclick="exportGLB()" class="btn ghost">匯出 GLB</button>
      <button id="btn-record" class="btn ghost">開始錄影</button>
    </div>

    <div id="ui">
        <label>
            選擇圖形：
            <select id="shapeType">
                <option value="cube">立方體</option>
                <option value="circle">球體</option>
                <option value="lshape">不規則圖形</option>
                <option value="tI">I 形方塊</option>
                <option value="tT">T 形方塊</option>
                <option value="tZ">Z 形方塊</option>
                <option value="tL">L 形方塊</option>
            </select>
          </label>
          <div id="boxParams" class="param-group">
            <input id="boxWidth" type="number" placeholder="寬 (Width)" />
            <input id="boxHeight" type="number" placeholder="高 (Height)" />
            <input id="boxDepth" type="number" placeholder="深 (Depth)" />
          </div>
          <div id="sphereParams" class="param-group" style="display:none;">
            <input id="sphereWidth" type="number" placeholder="直徑 (Diameter)" />
          </div>
          <div id="customParams" class="param-group" style="display:none;">
            <input id="customWidth" type="number" placeholder="單位邊長 (Width)" />
          </div>
          <label>
            顏色：
            <input id="color" type="color" value="#00ff00" />
          </label>
          <label>
            <input type="checkbox" id="hasHole" /> 是否簍空
          </label>
          <div id="holeInput" style="display:none;">
            <input id="holeWidth" type="number" placeholder="孔寬 (Hole Width)" />
            <input id="holeHeight" type="number" placeholder="孔高 (Hole Height)" />
          </div>
          <div style="margin-top: 8px"></div>
            <button id="generate">產生物體</button>
            <button id="recognizeBtn" onclick="this.setAttribute('data-clicked', 'true')">辨識參數</button>
          </div>
        </div>
        <aside id="library">
          <h3>物體清單</h3>
          <div id="libraryList"></div>
        </aside>
        <img id="video" src="/get-camera-frame" alt="攝影機畫面" />

        <!-- 主程式 -->
        <script type="module" src="/static/main.js"></script>

        <!-- 🔹 新增按鈕事件邏輯 -->
        <script>
          window.addEventListener('DOMContentLoaded', () => {
            const optBtn = document.getElementById('optimizeBtn');
            const stopBtn = document.getElementById('stopOptimizeBtn');

            optBtn?.addEventListener('click', () => {
              if (typeof packToTheMax === 'function') packToTheMax();
            });

            stopBtn?.addEventListener('click', () => {
              if (typeof stopAnnealing === 'function') stopAnnealing();
              if (window.ConvergenceChart && typeof ConvergenceChart.stop === 'function')
                ConvergenceChart.stop();
            });
          });
        </script>

        <script>
        function placeLibrary() {
          const ui = document.getElementById('ui');
          const lib = document.getElementById('library');
          if (!ui || !lib) return;
          const r = ui.getBoundingClientRect();
          lib.style.left = r.left + 'px';
          lib.style.top  = (r.bottom + 10) + 'px';
          lib.style.width = r.width + 'px';
          lib.style.height = Math.max(220, Math.min(460, window.innerHeight - (r.bottom + 20))) + 'px';
        }
        addEventListener('load', placeLibrary);
        addEventListener('resize', placeLibrary);
    </script>
    <script>
      const btnRecord = document.getElementById('btn-record');
      let mediaRecorder;
      let recordedChunks = [];
      let isRecording = false;

      if (btnRecord) {
          btnRecord.addEventListener('click', toggleRecording);
      }

      function toggleRecording() {
          if (!isRecording) {
              startRecording();
          } else {
              stopRecording();
          }
      }

      function startRecording() {
          // 抓取 Three.js 的 Canvas
          const canvas = document.querySelector('canvas');
          if (!canvas) {
              alert("找不到畫布 (Canvas)，請確認畫面已載入");
              return;
          }

          // 建立錄影串流 (30 FPS)
          const stream = canvas.captureStream(30);
          
          let options = { mimeType: 'video/webm;codecs=vp9' };
          if (!MediaRecorder.isTypeSupported(options.mimeType)) {
              options = { mimeType: 'video/webm' };
          }

          try {
              mediaRecorder = new MediaRecorder(stream, options);
          } catch (e) {
              alert('您的瀏覽器不支援此錄影格式');
              return;
          }

          mediaRecorder.ondataavailable = function(event) {
              if (event.data.size > 0) {
                  recordedChunks.push(event.data);
              }
          };

          mediaRecorder.onstop = function() {
              const blob = new Blob(recordedChunks, { type: 'video/webm' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.style.display = 'none';
              a.href = url;
              
              const date = new Date();
              const timestamp = `${date.getHours()}-${date.getMinutes()}-${date.getSeconds()}`;
              a.download = `object-demo-${timestamp}.webm`;
              
              document.body.appendChild(a);
              a.click();
              
              setTimeout(() => {
                  document.body.removeChild(a);
                  window.URL.revokeObjectURL(url);
                  recordedChunks = [];
              }, 100);
          };

          mediaRecorder.start();
          isRecording = true;
          
          // 更新按鈕狀態
          btnRecord.textContent = "⬛ 停止";
          btnRecord.style.background = "#333";
      }

      function stopRecording() {
          if(mediaRecorder && mediaRecorder.state !== 'inactive') {
              mediaRecorder.stop();
              isRecording = false;
              
              // 還原按鈕狀態
              btnRecord.textContent = "🔴 錄影";
              btnRecord.style.background = "#dc3545";
          }
      }
    </script>
  </body>
</html>
