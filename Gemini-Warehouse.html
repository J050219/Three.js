<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>3D 智慧倉儲</title>
    <style>
        /* 1. 背景優化 */
        body { 
            margin: 0; 
            overflow: hidden; 
            background: linear-gradient(180deg, #87CEFA 0%, #dbe9f4 100%); 
        }
        canvas { display: block; }
        
        #ui-container {
            position: absolute; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 200;
        }

        #status-bar {
            position: absolute; top: 20px; left: 20px;
            background-color: rgba(23, 32, 42, 0.85);
            color: #2ecc71;
            padding: 15px 25px; border-radius: 4px;
            font-family: 'Consolas', 'Microsoft JhengHei', monospace;
            font-size: 16px; font-weight: bold; pointer-events: none; z-index: 200;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 5px solid #2ecc71;
            backdrop-filter: blur(5px);
        }

        button {
            padding: 12px 24px; font-size: 15px; font-weight: bold;
            border-radius: 4px; cursor: pointer; border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15); transition: all 0.2s;
            color: white; font-family: 'Microsoft JhengHei', sans-serif; letter-spacing: 1px;
        }
        button:active { transform: translateY(2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        #btn-process { background-color: #3498db; } 
        #btn-process:hover { background-color: #2980b9; transform: translateY(-2px); }
        #btn-process.active { background-color: #27ae60; } 

        #btn-refill { background-color: #e74c3c; } 
        #btn-refill:hover { background-color: #c0392b; transform: translateY(-2px); }

        #btn-record { background-color: #34495e; border: 1px solid #2c3e50; }
        #btn-record:hover { background-color: #2c3e50; transform: translateY(-2px); }
        #btn-record.recording { 
            background-color: #c0392b; color: white; 
            animation: pulse 1.5s infinite; border: 1px solid #e74c3c;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(192, 57, 43, 0); }
            100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0); }
        }
    </style>
</head>
<body>
    <div id="status-bar">系統待命中...</div>
    
    <div id="ui-container">
        <button id="btn-process">▶ 啟動自動循環</button>
        <button id="btn-refill">＋ 啟動生產線補貨</button>
        <button id="btn-record">● 開始錄影</button> 
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
                "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@23.1.1"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import TWEEN from '@tweenjs/tween.js';

        // --- 全域變數 ---
        let scene, camera, renderer, controls;
        let forklift, forks, liftGroup; 
        let liftMast; 
        let currentBlueGroup; 
        let emptyPalletStack = []; 
        let cargoInRed = []; 

        let isAutoLoop = false; 
        let isProcessing = false; 
        let isRefilling = false; // 補貨狀態旗標
        let finishedBatchCount = 0; 

        // --- 錄影變數 ---
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        // --- [新增] 成品區排列參數 ---
        const STORAGE_ROWS = 5;       // 設定擺幾排
        const STORAGE_COLS = 5;       // 設定擺幾列
        const STORAGE_GAP = 140;      // 每個棧板的間距
        const STORAGE_START_X = -900; // 第一個成品的 X 座標 (放在左側空地)
        const STORAGE_START_Z = -300; // 第一個成品的 Z 座標
        
        let finishedCargoList = [];   // 記錄已擺放的成品

        // --- 參數 ---
        const BLUE_SIZE = 110;
        const RED_SIZE = 220;
        const GRID_DIM = 4; 
        const ITEM_SIZE = (BLUE_SIZE / GRID_DIM) - 2;

        // 輸送帶參數
        const BELT_HEIGHT = 220;    // 輸送帶框架高度
        const ROLLER_RADIUS = 2;    // 滾輪半徑
        const ROLLER_OFFSET = 4;    // 滾輪中心相對於框架頂部的偏移量
        
        // --- 材質 ---
        const matGround = new THREE.MeshPhongMaterial({ color: 0x444444, depthWrite: false }); 
        const matWood = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.9 });
        const matWall = new THREE.MeshStandardMaterial({ color: 0xF5F5F5, roughness: 0.9 }); 
        const matBlueContainer = new THREE.MeshPhysicalMaterial({ color: 0x00FFFF, transmission: 0.2, opacity: 0.3, transparent: true, roughness: 0.2, metalness: 0.1, side: THREE.DoubleSide });
        const matRedContainer = new THREE.MeshPhysicalMaterial({ color: 0xFF3333, transmission: 0.2, opacity: 0.2, transparent: true, roughness: 0.2, metalness: 0.1, side: THREE.DoubleSide });
        
        // [修復] 定義警示燈材質
        const matWarningLight = new THREE.MeshBasicMaterial({ color: 0xFF0000 });

        // 堆高機材質
        const matForkliftBody = new THREE.MeshStandardMaterial({ color: 0xF39C12, metalness: 0.4, roughness: 0.3 }); // 工業黃
        const matDarkMetal = new THREE.MeshStandardMaterial({ color: 0x2C3E50, metalness: 0.7, roughness: 0.4 });
        const matSteel = new THREE.MeshStandardMaterial({ color: 0x95a5a6, metalness: 0.8, roughness: 0.2 });
        const matInnerMast = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.6, roughness: 0.3 }); // 銀色內柱
        const matTire = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
        
        const matMachineBody = new THREE.MeshStandardMaterial({ color: 0x7f8c8d, roughness: 0.5, metalness: 0.4 });
        const matMachineDetail = new THREE.MeshStandardMaterial({ color: 0xf1c40f, roughness: 0.6 });

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0xdbe9f4, 1000, 3500);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 8000);
            camera.position.set(650, 700, 1050); // 調整相機以便看到機器

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
            renderer.toneMapping = THREE.ACESFilmicToneMapping; 
            renderer.toneMappingExposure = 1.1;
            document.body.appendChild(renderer.domElement);

            // --- 燈光 ---
            const ambient = new THREE.AmbientLight(0xffffff, 0.6); 
            scene.add(ambient);
            
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            hemiLight.position.set(0, 500, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(-300, 1000, 500); 
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.set(2048, 2048);
            dirLight.shadow.camera.left = -1000;
            dirLight.shadow.camera.right = 1000;
            dirLight.shadow.camera.top = 1000;
            dirLight.shadow.camera.bottom = -1000;
            dirLight.shadow.bias = -0.0001;
            scene.add(dirLight);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(300, 100, 0); 
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; 

            document.getElementById('btn-process').addEventListener('click', toggleAutoLoop);
            document.getElementById('btn-refill').addEventListener('click', refillRedContainer);
            document.getElementById('btn-record').addEventListener('click', toggleRecording);

            createEnvironment();
            createBackgroundMachinery();
            createConveyorSystem(); // 建立輸送帶
            createInitialContainers();
            createPalletStack();
            createRealisticForklift(); 
            
            window.addEventListener('resize', onWindowResize);
        }
        
        // --- 錄影功能 ---
        function toggleRecording() {
            const btn = document.getElementById('btn-record');
            if (!isRecording) {
                startRecording();
                btn.innerText = "■ 停止錄影";
                btn.classList.add("recording");
                updateStatus("錄影中... (請操作場景)");
            } else {
                stopRecording();
                btn.innerText = "● 開始錄影";
                btn.classList.remove("recording");
                updateStatus("錄影結束，正在下載影片...");
            }
        }

        function startRecording() {
            recordedChunks = [];
            const canvas = renderer.domElement;
            const stream = canvas.captureStream(30);
            
            let options = { mimeType: 'video/webm; codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' };
            }

            try {
                mediaRecorder = new MediaRecorder(stream, options);
            } catch (e) {
                console.error("MediaRecorder error:", e);
                alert("瀏覽器不支援錄影");
                return;
            }

            mediaRecorder.ondataavailable = function(event) {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };

            mediaRecorder.onstop = function() {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                document.body.appendChild(a);
                a.style = 'display: none';
                a.href = url;
                a.download = 'warehouse_simulation.webm';
                a.click();
                window.URL.revokeObjectURL(url);
            };

            mediaRecorder.start();
            isRecording = true;
        }

        function stopRecording() {
            if(mediaRecorder) {
                mediaRecorder.stop();
                isRecording = false;
            }
        }
        
        function updateStatus(text) {
            document.getElementById('status-bar').innerText = text;
        }

        function toggleAutoLoop() {
            const btn = document.getElementById('btn-process');
            if (!isAutoLoop) {
                isAutoLoop = true;
                btn.innerText = "■ 停止自動循環";
                btn.classList.add('active');
                if (!isProcessing) startPackingProcess(); 
            } else {
                isAutoLoop = false;
                btn.innerText = "▶ 啟動自動循環";
                btn.classList.remove('active');
                updateStatus("正在等待當前流程結束...");
            }
        }

        // --- 場景物件 ---
        function createEnvironment() {
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(8000, 8000), matGround);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            const grid = new THREE.GridHelper(8000, 80, 0x000000, 0x000000);
            grid.material.opacity = 0.15;
            grid.material.transparent = true;
            scene.add(grid);

            const backWall = new THREE.Mesh(new THREE.BoxGeometry(5000, 1000, 20), matWall);
            backWall.position.set(0, 500, -800);
            backWall.receiveShadow = true;
            scene.add(backWall);
            
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(20, 1000, 5000), matWall);
            leftWall.position.set(-1500, 500, 0);
            leftWall.receiveShadow = true;
            scene.add(leftWall);

            const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(320, 420, 10), matDarkMetal);
            doorFrame.position.set(600, 210, -795);
            scene.add(doorFrame);
            
            const door = new THREE.Mesh(new THREE.PlaneGeometry(300, 400), new THREE.MeshStandardMaterial({color:0x34495e, roughness:0.2, metalness:0.5}));
            door.position.set(600, 200, -788);
            scene.add(door);
            
            [-800, -400, 0].forEach(x => {
                const glass = new THREE.Mesh(new THREE.PlaneGeometry(280, 180), new THREE.MeshPhysicalMaterial({
                    color:0x87CEFA, metalness: 0.1, roughness: 0, transmission: 0.2, opacity:0.8, transparent:true
                }));
                glass.position.set(x, 600, -788);
                scene.add(glass);
                const frame = new THREE.Mesh(new THREE.BoxGeometry(290, 190, 5), matDarkMetal);
                frame.position.set(x, 600, -790);
                scene.add(frame);
            });
        }

        // --- 生產機器與傳送帶 ---
        function createSourceMachine(x, z) {
            const group = new THREE.Group();
            
            // 機器主體
            const bodyH = 280;
            const bodyW = 120;
            const bodyD = 120;
            const body = new THREE.Mesh(new THREE.BoxGeometry(bodyW, bodyH, bodyD), matMachineBody);
            body.position.set(0, bodyH/2, 0);
            body.castShadow = true;
            group.add(body);

            // 機器頂蓋
            const top = new THREE.Mesh(new THREE.BoxGeometry(bodyW-10, 20, bodyD-10), matDarkMetal);
            top.position.set(0, bodyH+10, 0);
            group.add(top);

            // 警示燈
            const lightPole = new THREE.Mesh(new THREE.CylinderGeometry(2,2, 20), matDarkMetal);
            lightPole.position.set(30, bodyH+20, 30);
            group.add(lightPole);
            const light = new THREE.Mesh(new THREE.CylinderGeometry(4,4,8), matWarningLight);
            light.position.set(30, bodyH+32, 30);
            group.add(light);

            // 出口遮罩 (面向 -X 方向)
            const exitHood = new THREE.Mesh(new THREE.BoxGeometry(20, 60, 80), matDarkMetal);
            exitHood.position.set(-bodyW/2 - 10, BELT_HEIGHT + 30, 0); // 高度對齊傳送帶
            group.add(exitHood);

            // 黑色出口洞
            const exitHole = new THREE.Mesh(new THREE.PlaneGeometry(10, 50), new THREE.MeshBasicMaterial({color:0x000000}));
            exitHole.position.set(-bodyW/2 - 20.1, BELT_HEIGHT + 30, 0);
            exitHole.rotation.y = -Math.PI/2;
            group.add(exitHole);

            // 支腳
            const legGeo = new THREE.BoxGeometry(10, 20, 10);
            [1, -1].forEach(kx => {
                [1, -1].forEach(kz => {
                    const leg = new THREE.Mesh(legGeo, matDarkMetal);
                    leg.position.set(kx*(bodyW/2-5), 10, kz*(bodyD/2-5));
                    group.add(leg);
                });
            });

            group.position.set(x, 0, z);
            scene.add(group);
            return group;
        }

        // --- 建立輸送帶系統 ---
        function createConveyorSystem() {
            createSourceMachine(660, 0); // 放置機器
            const conveyorGroup = new THREE.Group();
            
            // [修復] 定義輸送帶寬度 (之前漏掉的變數)
            const beltWidth = 90;

            // 輸送帶本體
            const startX = 600;
            const endX = 370;
            const beltLength = startX - endX;
            
            // 支架
            for(let i=0; i<3; i++) {
                const posX = endX + 10 + i * ((beltLength-20)/2);
                const leg = new THREE.Mesh(new THREE.BoxGeometry(5, BELT_HEIGHT, 5), matDarkMetal);
                leg.position.set(posX, BELT_HEIGHT/2, -20);
                conveyorGroup.add(leg);
                const leg2 = new THREE.Mesh(new THREE.BoxGeometry(5, BELT_HEIGHT, 5), matDarkMetal);
                leg2.position.set(posX, BELT_HEIGHT/2, 20);
                conveyorGroup.add(leg2);
            }

            // 輸送帶框架
            const frameGeo = new THREE.BoxGeometry(beltLength + 20, 5, beltWidth);
            const frame = new THREE.Mesh(frameGeo, matDarkMetal);
            frame.position.set((startX + endX)/2, BELT_HEIGHT, 0); // 中心點
            conveyorGroup.add(frame);

            // 滾輪 (視覺效果)
            const rollerGeo = new THREE.CylinderGeometry(ROLLER_RADIUS, ROLLER_RADIUS, beltWidth - 5, 16);
            rollerGeo.rotateX(Math.PI/2);

            const rollerCount = Math.floor(beltLength / 8);
            for(let i=0; i <= rollerCount; i++) {
                const roller = new THREE.Mesh(rollerGeo, matMachineDetail);
                // X 從 endX 到 startX 分布
                const xPos = endX + i * 8; 
                // Y 位置 = 框架中心Y + 偏移量
                roller.position.set(xPos, BELT_HEIGHT + ROLLER_OFFSET, 0);
                conveyorGroup.add(roller);
            }

            scene.add(conveyorGroup);
        }

        function createBackgroundMachinery() {
            const siloGroup = new THREE.Group();
            const siloGeo = new THREE.CylinderGeometry(40, 40, 250, 64);
            const silo1 = new THREE.Mesh(siloGeo, matMachineBody); silo1.position.set(0, 125, 0); silo1.castShadow = true;
            const silo2 = new THREE.Mesh(siloGeo, matMachineBody); silo2.position.set(90, 125, 0); silo2.castShadow = true;
            
            const domeGeo = new THREE.SphereGeometry(40, 32, 16, 0, Math.PI*2, 0, Math.PI/2);
            const dome1 = new THREE.Mesh(domeGeo, matMachineBody); dome1.position.set(0, 250, 0);
            const dome2 = new THREE.Mesh(domeGeo, matMachineBody); dome2.position.set(90, 250, 0);

            siloGroup.add(silo1, silo2, dome1, dome2);
            const pipeGeo = new THREE.CylinderGeometry(5, 5, 90);
            const pipe = new THREE.Mesh(pipeGeo, matMachineDetail);
            pipe.rotation.z = Math.PI/2;
            pipe.position.set(45, 200, 0);
            siloGroup.add(pipe);

            siloGroup.position.set(-600, 0, -450);
            scene.add(siloGroup);

            const convGroup = new THREE.Group();
            const convBody = new THREE.Mesh(new THREE.BoxGeometry(400, 20, 60), matMachineBody);
            convBody.position.y = 50; convBody.castShadow = true;
            for(let i=0; i<5; i++) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(3,3,50), matDarkMetal);
                leg.position.set(-180 + i*90, 25, 0);
                leg.castShadow = true;
                convGroup.add(leg);
            }
            for(let i=0; i<20; i++) {
                const roller = new THREE.Mesh(new THREE.CylinderGeometry(2,2,55), matMachineDetail);
                roller.rotation.x = Math.PI/2;
                roller.position.set(-180 + i*19, 62, 0);
                convGroup.add(roller);
            }
            convGroup.add(convBody);
            convGroup.position.set(200, 0, -450);
            scene.add(convGroup);

            const panel = new THREE.Mesh(new THREE.BoxGeometry(60, 100, 40), matMachineBody);
            panel.position.set(500, 50, -450); panel.castShadow = true;
            scene.add(panel);
            const btn1 = new THREE.Mesh(new THREE.CylinderGeometry(2,2,2), new THREE.MeshBasicMaterial({color:0xff0000}));
            btn1.rotation.x = Math.PI/2; btn1.position.set(500, 80, -428); scene.add(btn1);
            const btn2 = new THREE.Mesh(new THREE.CylinderGeometry(2,2,2), new THREE.MeshBasicMaterial({color:0x00ff00}));
            btn2.rotation.x = Math.PI/2; btn2.position.set(510, 80, -428); scene.add(btn2);
        }

        function createPallet(width, depth) {
            const group = new THREE.Group();
            const plankH = 2; const runnerH = 10;
            const topGeo = new THREE.BoxGeometry(width, plankH, depth/7*0.9);
            for(let i=0; i<7; i++){
                const b = new THREE.Mesh(topGeo, matWood);
                b.position.set(0, runnerH + plankH/2, (i/6-0.5)*(depth-depth/7*0.9));
                b.castShadow=true; b.receiveShadow=true; group.add(b);
            }
            const runnerGeo = new THREE.BoxGeometry(width*0.12, runnerH, depth);
            for(let i=0; i<3; i++){
                const l = new THREE.Mesh(runnerGeo, matWood);
                l.position.set((i/2-0.5)*(width*0.9), runnerH/2, 0);
                l.castShadow=true; l.receiveShadow=true; group.add(l);
            }
            return group;
        }

        function createInitialContainers() {
            createNewBlueContainerGroup();
            const redGroup = new THREE.Group();
            scene.add(redGroup);
            redGroup.position.set(250, 0, 0);
            redGroup.add(createPallet(RED_SIZE, RED_SIZE));
            const redBox = new THREE.Mesh(new THREE.BoxGeometry(RED_SIZE, RED_SIZE, RED_SIZE), matRedContainer);
            redBox.position.set(0, 12 + RED_SIZE/2, 0); 
            redBox.add(new THREE.LineSegments(new THREE.EdgesGeometry(redBox.geometry), new THREE.LineBasicMaterial({color:0xff0000, transparent:true, opacity:0.5})));
            redGroup.add(redBox);
        }

        function createNewBlueContainerGroup() {
            currentBlueGroup = new THREE.Group();
            scene.add(currentBlueGroup);
            currentBlueGroup.position.set(0, 0, 0); 
            currentBlueGroup.add(createPallet(BLUE_SIZE, BLUE_SIZE));
            const blueBox = new THREE.Mesh(new THREE.BoxGeometry(BLUE_SIZE, BLUE_SIZE, BLUE_SIZE), matBlueContainer);
            blueBox.position.set(0, 12 + BLUE_SIZE/2, 0);
            blueBox.add(new THREE.LineSegments(new THREE.EdgesGeometry(blueBox.geometry), new THREE.LineBasicMaterial({color:0x00ffff, transparent:true, opacity:0.5})));
            currentBlueGroup.add(blueBox);
        }

        function createPalletStack() {
            for(let i=0; i<12; i++){
                addPalletToStack(i);
            }
        }

        function addPalletToStack(index) {
            const p = createPallet(BLUE_SIZE, BLUE_SIZE);
            p.position.set(0, index*14, -250); 
            p.rotation.y = (Math.random()-0.5)*0.1;
            scene.add(p);
            emptyPalletStack.push(p);
        }

        function createRealisticForklift() {
            forklift = new THREE.Group();
            const chassis = new THREE.Mesh(new THREE.BoxGeometry(35, 15, 60), matForkliftBody);
            chassis.position.y = 12; chassis.castShadow = true; forklift.add(chassis);
            const cw = new THREE.Mesh(new THREE.CylinderGeometry(18, 18, 35, 32, 1, false, 0, Math.PI), matForkliftBody);
            cw.rotation.set(Math.PI/2, Math.PI/2, 0); cw.position.set(0, 12, -30); forklift.add(cw);
            
            const postFL = new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,45), matDarkMetal); postFL.position.set(14, 40, 10); forklift.add(postFL);
            const postFR = new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,45), matDarkMetal); postFR.position.set(-14, 40, 10); forklift.add(postFR);
            const postBL = new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,45), matDarkMetal); postBL.position.set(14, 40, -15); forklift.add(postBL);
            const postBR = new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,45), matDarkMetal); postBR.position.set(-14, 40, -15); forklift.add(postBR);
            const roof = new THREE.Mesh(new THREE.BoxGeometry(32, 2, 30), matDarkMetal); roof.position.set(0, 63, -2); forklift.add(roof);

            const driverGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(14, 20, 10), new THREE.MeshStandardMaterial({color: 0x3498db}));
            body.position.set(0, 30, -5); driverGroup.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(5, 16, 16), new THREE.MeshStandardMaterial({color: 0xFFCCAA}));
            head.position.set(0, 42, -5); driverGroup.add(head);
            forklift.add(driverGroup);

            const wGeo = new THREE.CylinderGeometry(9, 9, 8, 24); wGeo.rotateZ(Math.PI/2);
            const wGeoS = new THREE.CylinderGeometry(6, 6, 6, 24); wGeoS.rotateZ(Math.PI/2);
            const fw1 = new THREE.Mesh(wGeo, matTire); fw1.position.set(18, 9, 20); forklift.add(fw1);
            const fw2 = new THREE.Mesh(wGeo, matTire); fw2.position.set(-18, 9, 20); forklift.add(fw2);
            const rw1 = new THREE.Mesh(wGeoS, matTire); rw1.position.set(16, 6, -20); forklift.add(rw1);
            const rw2 = new THREE.Mesh(wGeoS, matTire); rw2.position.set(-16, 6, -20); forklift.add(rw2);

            const mastL = new THREE.Mesh(new THREE.BoxGeometry(2, 70, 4), matDarkMetal); mastL.position.set(10, 35, 32); forklift.add(mastL);
            const mastR = new THREE.Mesh(new THREE.BoxGeometry(2, 70, 4), matDarkMetal); mastR.position.set(-10, 35, 32); forklift.add(mastR);

            liftMast = new THREE.Group();
            const innerL = new THREE.Mesh(new THREE.BoxGeometry(1.5, 70, 3), matInnerMast); innerL.position.set(10, 35, 0); liftMast.add(innerL);
            const innerR = new THREE.Mesh(new THREE.BoxGeometry(1.5, 70, 3), matInnerMast); innerR.position.set(-10, 35, 0); liftMast.add(innerR);
            const crossBar = new THREE.Mesh(new THREE.BoxGeometry(22, 4, 2), matInnerMast); crossBar.position.set(0, 68, 0); liftMast.add(crossBar);
            liftMast.position.set(0, 0, 32); forklift.add(liftMast);

            liftGroup = new THREE.Group();
            const carriage = new THREE.Mesh(new THREE.BoxGeometry(20, 15, 2), matSteel); carriage.position.set(0, 5, 0); liftGroup.add(carriage);
            const fL = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 40), matSteel); fL.position.set(6, 0, 20); liftGroup.add(fL);
            const fR = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 40), matSteel); fR.position.set(-6, 0, 20); liftGroup.add(fR);
            liftGroup.position.set(0, 5, 36); forklift.add(liftGroup);
            forks = liftGroup;

            forklift.position.set(150, 0, 150); forklift.rotation.y = -Math.PI/2;
            scene.add(forklift);
        }

        function getRandomColor() { return [0xFF6B6B, 0x4ECDC4, 0xFFD93D, 0xFF9F1C, 0xAB83A1, 0x2E86AB][Math.floor(Math.random()*6)]; }

       function refillRedContainer() {
            if (isRefilling || cargoInRed.length > 300) return;
            isRefilling = true;
            updateStatus("狀態: 輸送帶補貨中...");

            let count = 0;
            const totalItems = 150; // 每次補 30 個
            
            // 循環生成物體
            const interval = setInterval(() => {
                count++;
                if(count >= totalItems) {
                    clearInterval(interval);
                    setTimeout(() => { 
                        isRefilling = false; 
                        updateStatus("狀態: 補貨完成，可開始作業"); 
                    }, 1000);
                }

                let geo, itemHeight; const r = Math.random();
                if(r>0.7) { itemHeight = ITEM_SIZE*0.8; geo = new THREE.BoxGeometry(ITEM_SIZE, itemHeight, ITEM_SIZE); } 
                else if(r>0.4) { itemHeight = ITEM_SIZE; geo = new THREE.BoxGeometry(ITEM_SIZE*0.9, itemHeight, ITEM_SIZE*0.9); } 
                else { itemHeight = ITEM_SIZE; geo = new THREE.CylinderGeometry(ITEM_SIZE/2, ITEM_SIZE/2, ITEM_SIZE, 16); }
                
                const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: getRandomColor(), roughness:0.3, metalness:0.1}));
                mesh.castShadow = true; mesh.receiveShadow = true;
                
                // [修復] 計算精確的生成高度
                const spawnY = BELT_HEIGHT + ROLLER_OFFSET + (itemHeight / 2);
                mesh.position.set(640, spawnY, (Math.random()-0.5)*10);
                mesh.rotation.set(0, Math.random()*3, 0);
                scene.add(mesh);

                // [修復] 補全斷裂的動畫鏈
                new TWEEN.Tween(mesh.position)
                    .to({ x: 600 }, 500)
                    .easing(TWEEN.Easing.Linear.None)
                    .onComplete(() => {
                        new TWEEN.Tween(mesh.position)
                            .to({ x: 370 }, 2000)
                            .easing(TWEEN.Easing.Linear.None)
                            .onComplete(() => {
                                const targetX = 250 + (Math.random()-0.5) * 150;
                                const targetZ = (Math.random()-0.5) * 150;
                                const targetY = 20 + Math.random() * 80;

                                new TWEEN.Tween(mesh.position)
                                    .to({ x: targetX, z: targetZ }, 800)
                                    .easing(TWEEN.Easing.Quadratic.Out)
                                    .start();

                                new TWEEN.Tween(mesh.position)
                                    .to({ y: targetY }, 800)
                                    .easing(TWEEN.Easing.Bounce.Out)
                                    .onComplete(() => { cargoInRed.push(mesh); })
                                    .start();
                                
                                new TWEEN.Tween(mesh.rotation)
                                    .to({ x: Math.random()*6, z: Math.random()*6 }, 800)
                                    .start();
                            })
                            .start();
                    })
                    .start();
            }, 100); // 調整生成間隔
        }

        // --- 堆高機與流程控制 (完整實作) ---
        function startPackingProcess() {
            if (isProcessing) return;
            if (cargoInRed.length < 16) { 
                if(!isRefilling) {
                    updateStatus("警告：原料不足！請點擊補貨");
                    isAutoLoop = false;
                    document.getElementById('btn-process').innerText = "▶ 啟動自動循環";
                    document.getElementById('btn-process').classList.remove('active');
                }
                return;
            }

            isProcessing = true;
            updateStatus("狀態: 裝箱作業進行中...");

            const packingList = [];
            for(let i=0; i<64; i++) {

                if(cargoInRed.length > 0) packingList.push(cargoInRed.pop());

            }

            let completed = 0;
            packingList.forEach((mesh, idx) => {
                const gx = idx % GRID_DIM;
                const gy = Math.floor((idx / GRID_DIM) % GRID_DIM);
                const gz = Math.floor(idx / (GRID_DIM*GRID_DIM));

                const tx = (gx - (GRID_DIM-1)/2) * (ITEM_SIZE + 2);
                const ty = (gy - (GRID_DIM-1)/2) * (ITEM_SIZE + 2) + 67;
                const tz = (gz - (GRID_DIM-1)/2) * (ITEM_SIZE + 2);

                new TWEEN.Tween(mesh.position).to({y: 200}, 500).delay(idx*20).start();
                new TWEEN.Tween(mesh.position).to({x: tx, y: ty, z: tz}, 1000).easing(TWEEN.Easing.Cubic.Out).delay(idx*20 + 500)
                    .onComplete(() => {
                        new TWEEN.Tween(mesh.rotation).to({x:0, y:0, z:0}, 200).start();
                        currentBlueGroup.attach(mesh); 
                        mesh.position.set(tx, ty, tz); 
                        mesh.rotation.set(0, 0, 0);
                        completed++;
                        if(completed === packingList.length) {
                            setTimeout(runForkliftSequence, 500);
                        }
                    }).start();
            });
        }

        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
        function tweenMove(target, dur) { return new Promise(r => new TWEEN.Tween(forklift.position).to(target, dur).easing(TWEEN.Easing.Quadratic.InOut).onComplete(r).start()); }
        function tweenRotate(yRad, dur) { return new Promise(r => new TWEEN.Tween(forklift.rotation).to({y: yRad}, dur).onComplete(r).start()); }
        function tweenLift(targetY, dur) {
            return new Promise(r => {
                const startY = forks.position.y;
                new TWEEN.Tween({ y: startY }).to({ y: targetY }, dur).easing(TWEEN.Easing.Cubic.Out)
                    .onUpdate((o) => { forks.position.y = o.y; if(liftMast) liftMast.position.y = o.y * 0.5; })
                    .onComplete(r).start();
            });
        }

        async function runForkliftSequence() {
            try {
                // 1. 計算目前的擺放位置 (矩陣演算法)
                // finishedBatchCount 是已經完成的數量
                const index = finishedBatchCount; 
                
                // 如果放滿了 (超過 5x5 = 25 個)，就停止或重置 (這裡設定為停止並警示)
                if (index >= STORAGE_ROWS * STORAGE_COLS) {
                    updateStatus("成品區已滿！請重新整理頁面或清空");
                    isProcessing = false;
                    isAutoLoop = false;
                    document.getElementById('btn-process').classList.remove('active');
                    return;
                }

                // 計算行列： Row (X軸方向第幾排), Col (Z軸方向第幾列)
                const colIndex = index % STORAGE_COLS; 
                const rowIndex = Math.floor(index / STORAGE_COLS);

                // 計算目標座標
                const targetX = STORAGE_START_X + (colIndex * STORAGE_GAP); 
                const targetZ = STORAGE_START_Z + (rowIndex * STORAGE_GAP);

                updateStatus(`狀態: 搬至 ( ${rowIndex+1} ,  ${colIndex+1} )...`);

                // --- 路徑點定義 ---
                const P_HOME = {x: 150, z: 150};        // 待命點
                const P_PICKUP = {x: 0, z: 0};          // 取貨點
                const P_CHANNEL = {x: 0, z: targetZ};   // 通道點 (堆高機先開到對應的 Z 軸)
                const P_DROP = {x: targetX, z: targetZ};// 最終放置點
                const P_PALLET = {x: 0, z: -170};       // 空棧板區

                // ==========================
                // 步驟 1: 撿起剛做好的貨物
                // ==========================
                // 轉向並移動到取貨點前
                await tweenRotate(Math.PI, 600); 
                await tweenMove({x: 0, z: 100}, 1000); 
                
                // 抬起貨叉並插入
                await tweenLift(15, 500);
                
                // 連結物件 (把藍色貨物黏在堆高機上)
                forklift.attach(currentBlueGroup); 
                currentBlueGroup.position.set(0, 5, 85); 
                currentBlueGroup.rotation.set(0, 0, 0);
                
                // ==========================
                // 步驟 2: 運送到計算好的位置
                // ==========================
                // 倒退離開包裝區
                await tweenMove({x: 0, z: 150}, 600);
                await tweenLift(10, 300); // 運送高度

                // 移動到對應的 Z 軸通道 (這樣才不會撞到旁邊的貨)
                // 判斷是要往前開還是往後開
                if (targetZ > forklift.position.z) await tweenRotate(0, 600);
                else await tweenRotate(Math.PI, 600);
                
                await tweenMove(P_CHANNEL, 1500);

                // 轉向左側 (面向成品區 X 軸負方向)
                await tweenRotate(-Math.PI / 2, 800); 

                // 前進到放置點
                await tweenMove(P_DROP, 2000); 
                
                // 放下貨物
                await tweenLift(2, 500); 

                // 解除連結 (把貨物放回場景)
                scene.attach(currentBlueGroup); 
                currentBlueGroup.position.set(targetX, 0, targetZ); 
                currentBlueGroup.rotation.set(0, 0, 0);
                
                // 記錄這個成品，並增加計數器
                finishedCargoList.push(currentBlueGroup);
                finishedBatchCount++; 

                // ==========================
                // 步驟 3: 離開並補充新棧板
                // ==========================
                // 倒退回主通道
                await tweenMove(P_CHANNEL, 1500);

                // 轉向去拿空棧板
                updateStatus("狀態: 補充空棧板...");
                await tweenRotate(Math.PI, 800); 
                await tweenMove({x: 0, z: P_PALLET.z + 100}, 1500); 

                // 拿取空棧板邏輯
                if(emptyPalletStack.length < 3) {
                    // 如果快沒了，偷補幾個，避免報錯
                    for(let i=0; i<3; i++) addPalletToStack(emptyPalletStack.length+i);
                }
                const pallet = emptyPalletStack.pop();
                
                // 調整貨叉高度去對準棧板
                await tweenLift(14 * emptyPalletStack.length + 12, 500);
                await tweenMove({x: 0, z: P_PALLET.z + 15}, 800); 
                
                // 拿起來
                forklift.attach(pallet); 
                pallet.position.set(0, 5, 85); 
                pallet.rotation.set(0, 0, 0);
                await tweenLift(14 * emptyPalletStack.length + 30, 400); 

                // ==========================
                // 步驟 4: 回到起點準備下一輪
                // ==========================
                // 運回包裝區原點
                await tweenMove({x: 0, z: -50}, 1000); 
                await tweenLift(5, 800);
                await tweenRotate(0, 1000); 
                
                // 放下新棧板
                await tweenMove({x: 0, z: 70}, 1500); 
                await tweenLift(5, 400);
                
                scene.attach(pallet); 
                pallet.position.set(0, 0, 0); 
                pallet.rotation.set(0, 0, 0);
                
                // 產生新的藍色容器框線
                currentBlueGroup = new THREE.Group(); 
                scene.add(currentBlueGroup); 
                currentBlueGroup.attach(pallet);
                const blueBox = new THREE.Mesh(new THREE.BoxGeometry(BLUE_SIZE, BLUE_SIZE, BLUE_SIZE), matBlueContainer);
                blueBox.position.set(0, 12 + BLUE_SIZE/2, 0);
                blueBox.add(new THREE.LineSegments(new THREE.EdgesGeometry(blueBox.geometry), new THREE.LineBasicMaterial({color:0x00ffff, transparent:true, opacity:0.5})));
                currentBlueGroup.add(blueBox);

                // 堆高機回待命點
                updateStatus("狀態: 準備下一輪...");
                await tweenMove({x: 0, z: 150}, 800); 
                await tweenRotate(-Math.PI/2, 600); 
                await tweenMove(P_HOME, 1000);

                // 流程結束，檢查是否自動循環
                isProcessing = false; 
                if (isAutoLoop) startPackingProcess(); 

            } catch (e) { 
                console.error("堆高機流程錯誤:", e); 
                isProcessing = false; 
            }
        }
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
